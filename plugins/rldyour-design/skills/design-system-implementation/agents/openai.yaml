interface:
  display_name: "Design System Implementation"
  short_description: "Tokens, shadcn/ui, ReactBits"
  default_prompt: "Use $design-system-implementation to build a centralized token-based design system."

dependencies:
  tools:
    - type: "mcp"
      value: "figma"
      description: "Source for Figma variables, styles, components, assets, and Code Connect hints."
    - type: "mcp"
      value: "shadcn"
      description: "Primary registry workflow for shadcn/ui primitives, blocks, and component installation."
    - type: "mcp"
      value: "context7"
      description: "Official documentation lookup for framework, Tailwind, shadcn, or library-specific implementation details."
    - type: "mcp"
      value: "serena"
      description: "Preferred for inspecting existing design-system code and applying precise changes."

policy:
  allow_implicit_invocation: true
