interface:
  display_name: "FSD Frontend Architecture"
  short_description: "FSD UI and data placement"
  default_prompt: "Use $fsd-frontend-architecture to place UI, i18n, assets, data/admin ownership, imports, and public APIs in FSD."

dependencies:
  tools:
    - type: "mcp"
      value: "serena"
      description: "Preferred for semantic code inspection, symbol mapping, references, and precise FSD-aware edits."
    - type: "mcp"
      value: "context7"
      description: "Official documentation lookup for FSD, React, routing, Tailwind, and framework-specific architecture rules."

policy:
  allow_implicit_invocation: true
