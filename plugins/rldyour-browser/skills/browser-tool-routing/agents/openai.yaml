interface:
  display_name: "Browser Tool Routing"
  short_description: "Auto Playwright vs DevTools routing"
  default_prompt: "Use $browser-tool-routing to choose Playwright, Chrome DevTools, or both for browser validation or debugging."

dependencies:
  tools:
    - type: "mcp"
      value: "playwright"
      description: "Primary browser automation MCP for user flows, snapshots, screenshots, assertions, network/storage/testing workflows, and validation."
    - type: "mcp"
      value: "chrome-devtools"
      description: "Primary browser debugging MCP for console, network, DOM/runtime, layout, Lighthouse, and performance traces."

policy:
  allow_implicit_invocation: true
