interface:
  display_name: "Technical Research"
  short_description: "Auto docs, architecture, GitHub patterns"
  default_prompt: "Use $tech-research to research technical docs, repository architecture, and production usage patterns before implementation."

dependencies:
  tools:
    - type: "mcp"
      value: "context7"
      description: "Official documentation for libraries, frameworks, APIs, migrations, and configuration."
    - type: "mcp"
      value: "openaiDeveloperDocs"
      description: "Official OpenAI and Codex documentation for APIs, models, plugins, skills, MCP, hooks, and configuration."
      transport: "streamable_http"
      url: "https://developers.openai.com/mcp"
    - type: "mcp"
      value: "deepwiki"
      description: "Architecture of public open-source repositories, feature internals, and design decisions."
      transport: "streamable_http"
      url: "https://mcp.deepwiki.com/mcp"
    - type: "mcp"
      value: "grep"
      description: "Real GitHub usage patterns for APIs, libraries, and error handling."
      transport: "streamable_http"
      url: "https://mcp.grep.app"

policy:
  allow_implicit_invocation: true
