interface:
  display_name: Technical Research
  short_description: 'Русскоязычная Codex skill metadata. EN: Auto docs, architecture, GitHub patterns'
  default_prompt: 'Используй $Technical Research для этой задачи с русскоязычным контекстом владельца. EN: Use $tech-research to research technical docs, repository architecture, and production usage patterns before implementation.'
dependencies:
  tools:
  - type: mcp
    value: context7
    description: 'Context7: официальная актуальная документация библиотек, API, migrations и конфигураций. EN: official current docs for libraries, APIs, migrations, and configuration.'
  - type: mcp
    value: openaiDeveloperDocs
    description: 'OpenAI Docs: официальная документация OpenAI/Codex для APIs, models, skills, MCP, hooks и config. EN: official OpenAI/Codex docs for APIs, models, skills, MCP, hooks, and config.'
    transport: streamable_http
    url: https://developers.openai.com/mcp
  - type: mcp
    value: deepwiki
    description: 'DeepWiki: архитектура GitHub-репозиториев, internals и проектные решения. EN: repository architecture, internals, and design decisions.'
    transport: streamable_http
    url: https://mcp.deepwiki.com/mcp
  - type: mcp
    value: grep
    description: 'Grep: реальные production-паттерны из GitHub-кода. EN: real-world production usage patterns.'
    transport: streamable_http
    url: https://mcp.grep.app
policy:
  allow_implicit_invocation: true
