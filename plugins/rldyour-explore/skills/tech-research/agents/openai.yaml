interface:
  display_name: "Техническое исследование"
  short_description: "Docs, архитектура и GitHub-паттерны"
  default_prompt: "Используй $tech-research, чтобы изучить технический scope фичи перед реализацией."

dependencies:
  tools:
    - type: "mcp"
      value: "context7"
      description: "Официальная документация библиотек, фреймворков, API, миграций и настроек."
    - type: "mcp"
      value: "deepwiki"
      description: "Архитектура public open-source репозиториев, устройство фич и проектные решения."
      transport: "streamable_http"
      url: "https://mcp.deepwiki.com/mcp"
    - type: "mcp"
      value: "grep"
      description: "Реальные GitHub-паттерны использования API, библиотек и обработчиков ошибок."
      transport: "streamable_http"
      url: "https://mcp.grep.app"

policy:
  allow_implicit_invocation: true
