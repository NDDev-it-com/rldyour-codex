interface:
  display_name: Technical Research
  short_description: 'Техисследование. EN: technical research'
  default_prompt: 'Используй $tech-research: docs, repos, patterns. EN: technical research.'
dependencies:
  tools:
  - type: mcp
    value: context7
    description: 'Документация Context7. EN: current library/API docs.'
  - type: mcp
    value: openaiDeveloperDocs
    description: 'Документация OpenAI. EN: official Codex/API docs.'
    transport: streamable_http
    url: https://developers.openai.com/mcp
  - type: mcp
    value: deepwiki
    description: 'Архитектура DeepWiki. EN: repository docs.'
    transport: streamable_http
    url: https://mcp.deepwiki.com/mcp
  - type: mcp
    value: grep
    description: 'Поиск кода. EN: production GitHub usage.'
    transport: streamable_http
    url: https://mcp.grep.app
policy:
  allow_implicit_invocation: true
