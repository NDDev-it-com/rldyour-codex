  default_prompt: 'Используй $ry-rules-review для этой задачи с русскоязычным контекстом владельца. EN: Use $ry-rules-review to audit this diff or scope against rldyour rules.'
dependencies:
  tools:
  - type: mcp
    value: serena
    description: 'Serena MCP: семантический анализ кода, memories, symbols, references и точечные правки. EN: semantic code inspection, memories, symbols, references, and precise edits.'
  - type: mcp
    value: sequential-thinking
    description: 'Sequential Thinking: структурированное рассуждение для нетривиальных решений и review. EN: structured reasoning for non-trivial decisions and review.'
  - type: mcp
    value: context7
    description: 'Context7: официальная актуальная документация библиотек, API, migrations и конфигураций. EN: official current docs for libraries, APIs, migrations, and configuration.'
policy:
  allow_implicit_invocation: true
