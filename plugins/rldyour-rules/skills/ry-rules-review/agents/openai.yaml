interface:
  display_name: "ry-rules-review"
  short_description: "Audit code against rldyour rules"
  default_prompt: "Use $ry-rules-review to audit this diff or scope against rldyour rules."

dependencies:
  tools:
    - type: "mcp"
      value: "serena"
      description: "Semantic diff and integration graph inspection."
    - type: "mcp"
      value: "sequential-thinking"
      description: "Structured review reasoning."
    - type: "mcp"
      value: "context7"
      description: "Official docs when review depends on current technology."

policy:
  allow_implicit_invocation: true

