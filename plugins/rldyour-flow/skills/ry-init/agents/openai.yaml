interface:
  display_name: "ry-init"
  short_description: "Initialize scoped project context"
  default_prompt: "Use $ry-init to initialize this project or scope with Serena-first context."

dependencies:
  tools:
    - type: "mcp"
      value: "serena"
      description: "Primary semantic project inspection and memory workflow."
    - type: "mcp"
      value: "context7"
      description: "Official documentation when technology context is unclear."
    - type: "mcp"
      value: "deepwiki"
      description: "Open-source repository architecture research."
    - type: "mcp"
      value: "grep"
      description: "Real-world GitHub usage patterns."

policy:
  allow_implicit_invocation: true

