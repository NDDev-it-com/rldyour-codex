interface:
  display_name: "ry-repair"
  short_description: "Repair stale repo contracts and AI-tool context"
  default_prompt: "Use $ry-repair to normalize stale docs, memories, contracts, hooks, and tool context."

dependencies:
  tools:
    - type: "mcp"
      value: "serena"
      description: "Semantic code inspection and memory freshness evidence."
    - type: "mcp"
      value: "github"
      description: "Repository issues, pull requests, and history when GitHub evidence is needed."
    - type: "mcp"
      value: "context7"
      description: "Official current documentation for tool/runtime repair claims."

policy:
  allow_implicit_invocation: true
