interface:
  display_name: "ry-deploy"
  short_description: "Deploy with server verification"
  default_prompt: "Use $ry-deploy to synchronize GitHub and deploy to the target server with verification."

dependencies:
  tools:
    - type: "mcp"
      value: "serena"
      description: "Project knowledge and implementation inspection during deployment fixes."
    - type: "mcp"
      value: "context7"
      description: "Official docs for deployment failures and tool behavior."
    - type: "mcp"
      value: "grep"
      description: "Real-world deployment patterns when diagnosing failures."

policy:
  allow_implicit_invocation: true

