interface:
  display_name: ry-start
  short_description: 'Полный lifecycle задачи: init, research, plan, gates, review, commit и sync. EN: Full feature lifecycle workflow'
  default_prompt: 'Используй $ry-start для этой задачи с русскоязычным контекстом владельца. EN: Use $ry-start to implement this task through research, plan, quality gates, review, and sync.'
dependencies:
  tools:
  - type: mcp
    value: serena
    description: 'Serena MCP: семантический анализ кода, memories, symbols, references и точечные правки. EN: semantic code inspection, memories, symbols, references, and precise edits.'
  - type: mcp
    value: context7
    description: 'Context7: официальная актуальная документация библиотек, API, migrations и конфигураций. EN: official current docs for libraries, APIs, migrations, and configuration.'
  - type: mcp
    value: deepwiki
    description: 'DeepWiki: архитектура GitHub-репозиториев, internals и проектные решения. EN: repository architecture, internals, and design decisions.'
  - type: mcp
    value: grep
    description: 'Grep: реальные production-паттерны из GitHub-кода. EN: real-world production usage patterns.'
  - type: mcp
    value: playwright
    description: 'Playwright: браузерная проверка, user flows, screenshots, snapshots и assertions. EN: browser validation, user flows, screenshots, snapshots, and assertions.'
  - type: mcp
    value: chrome-devtools
    description: 'Chrome DevTools: консоль, сеть, DOM/runtime, layout, Lighthouse и performance-debug. EN: console, network, DOM/runtime, layout, Lighthouse, and performance debugging.'
  - type: mcp
    value: semgrep
    description: 'Semgrep: статический security scan, когда он применим; findings требуют ручной проверки. EN: static security scanning when applicable; findings still require manual validation.'
policy:
  allow_implicit_invocation: true
