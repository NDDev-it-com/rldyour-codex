name = "architecture-reviewer"
description = "Read-only structural reviewer for architecture, dependency flow, and layer boundaries."
model = "gpt-5.5"
model_reasoning_effort = "medium"
sandbox_mode = "read-only"
nickname_candidates = ["Atlas", "Lintel", "Blueprint"]
# TEMPORARY: keep spawned subagents on the lightweight core MCP surface while
# Codex eagerly initializes MCP servers per session/subagent. Parent sessions
# keep specialist MCP servers for explicit browser/design/security/runtime work.
# Allowed/inherited: sequential-thinking, serena, context7, grep, deepwiki,
# openaiDeveloperDocs, codex_apps.
mcp_servers.playwright.enabled = false
mcp_servers.playwright.command = "bunx"
mcp_servers.playwright.args = ["@playwright/mcp@0.0.75", "--headless", "--caps=network,storage,testing,devtools"]
mcp_servers.playwright.startup_timeout_sec = 90
mcp_servers.playwright.tool_timeout_sec = 180

mcp_servers.chrome-devtools.enabled = false
mcp_servers.chrome-devtools.command = "bunx"
mcp_servers.chrome-devtools.args = ["chrome-devtools-mcp@0.26.0", "--headless", "--isolated", "--no-usage-statistics", "--no-performance-crux"]
mcp_servers.chrome-devtools.startup_timeout_sec = 90
mcp_servers.chrome-devtools.tool_timeout_sec = 180

mcp_servers.semgrep.enabled = false
mcp_servers.semgrep.command = "uvx"
mcp_servers.semgrep.args = ["--from", "semgrep==1.163.0", "semgrep", "mcp"]
mcp_servers.semgrep.startup_timeout_sec = 90
mcp_servers.semgrep.tool_timeout_sec = 180

mcp_servers.shadcn.enabled = false
mcp_servers.shadcn.command = "bunx"
mcp_servers.shadcn.args = ["shadcn@4.7.0", "mcp"]
mcp_servers.shadcn.startup_timeout_sec = 90
mcp_servers.shadcn.tool_timeout_sec = 120

mcp_servers.dart-flutter.enabled = false
mcp_servers.dart-flutter.command = "dart"
mcp_servers.dart-flutter.args = ["mcp-server", "--force-roots-fallback"]
mcp_servers.dart-flutter.startup_timeout_sec = 90
mcp_servers.dart-flutter.tool_timeout_sec = 180

mcp_servers.figma.enabled = false
mcp_servers.figma.url = "https://mcp.figma.com/mcp"
mcp_servers.figma.startup_timeout_sec = 60
mcp_servers.figma.tool_timeout_sec = 120

developer_instructions = """
You are architecture-reviewer, a focused structural review agent.

Rules:
- Review only. Do not modify files.
- Use this agent only when the parent explicitly requested delegated review work.
- Prioritize layer boundaries, dependency direction, module coupling, public entry points, and architecture-pattern fit.
- Inspect the actual diff and surrounding code before concluding.
- Prefer Serena symbol tools when available; otherwise use targeted search and file reads.
- Trace dependency chains and call paths before claiming an architectural violation.
- Ignore style-only nits unless they hide a structural risk.

Output:
- Lead with findings ordered by severity.
- Include concrete file references and concise evidence.
- Note positive architectural patterns briefly after findings.
- If no material issues are found, say so explicitly.
"""
