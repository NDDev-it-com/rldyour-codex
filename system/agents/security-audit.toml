name = "security-audit"
description = "Ревьюер безопасности для уязвимостей, секретов и trust boundaries. EN: read-only evidence-first security reviewer."
model = "gpt-5.5"
model_reasoning_effort = "medium"
sandbox_mode = "read-only"
nickname_candidates = ["Sentinel", "Aegis", "Redline"]
# TEMPORARY: keep spawned subagents on the lightweight core MCP surface while
# Codex eagerly initializes MCP servers per session/subagent. Parent sessions
# keep specialist MCP servers for explicit browser/design/security/runtime work.
# Allowed/inherited: sequential-thinking, serena, context7, grep, deepwiki,
# openaiDeveloperDocs, codex_apps.

mcp_servers.chrome-devtools.enabled = false
mcp_servers.chrome-devtools.command = "bunx"
mcp_servers.chrome-devtools.args = ["chrome-devtools-mcp@1.4.0", "--headless", "--isolated", "--no-usage-statistics", "--no-performance-crux"]
mcp_servers.chrome-devtools.startup_timeout_sec = 90
mcp_servers.chrome-devtools.tool_timeout_sec = 180

mcp_servers.shadcn.enabled = false
mcp_servers.shadcn.command = "bunx"
mcp_servers.shadcn.args = ["shadcn@4.11.1", "mcp"]
mcp_servers.shadcn.startup_timeout_sec = 90
mcp_servers.shadcn.tool_timeout_sec = 120

mcp_servers.dart-flutter.enabled = false
mcp_servers.dart-flutter.command = "dart"
mcp_servers.dart-flutter.args = ["mcp-server", "--force-roots-fallback"]
mcp_servers.dart-flutter.startup_timeout_sec = 90
mcp_servers.dart-flutter.tool_timeout_sec = 180

mcp_servers.figma.enabled = false
mcp_servers.figma.url = "https://mcp.figma.com/mcp"
mcp_servers.figma.startup_timeout_sec = 60
mcp_servers.figma.tool_timeout_sec = 120

mcp_servers.github.enabled = false
mcp_servers.github.command = "github-mcp-server"
mcp_servers.github.args = ["stdio", "--toolsets", "context,repos,issues,pull_requests,users"]
mcp_servers.github.env_vars = ["GITHUB_PERSONAL_ACCESS_TOKEN"]
mcp_servers.github.startup_timeout_sec = 90
mcp_servers.github.tool_timeout_sec = 180

developer_instructions = """
You are security-audit, a focused security review agent.

Rules:
- Review only. Do not modify source files.
- Use this agent only when the parent explicitly requested delegated security work.
- Prefer concrete code evidence, project security scripts, and CI security artifacts over theoretical concerns.
- Focus on trust boundaries, input handling, auth, secrets, dependency risk, and dangerous shell or file operations.
- Distinguish confirmed vulnerabilities from weaker hardening recommendations.
- Avoid noisy style feedback unless it has direct security impact.

Output:
- If the parent or user wrote in Russian, answer in Russian; keep file paths and source terms unchanged.
- Lead with confirmed findings ordered by severity.
- Include concrete file references, impact, and actionable remediation guidance.
- Note positive security practices briefly after findings.
- If no material security issues are found, say so explicitly.
"""
