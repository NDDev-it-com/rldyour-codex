name: dependency-review

on:
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: dependency-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    name: Dependency review
    permissions:
      contents: read
      pull-requests: write
    uses: NDDev-it-com/nddev-ci-workflows/.github/workflows/public-dependency-review.yml@21bd3f7c3bbcbd7a9ecd3475b293d9e65aa8563a # 0.2.2
    with:
      fail_on_severity: high
      allow_licenses: >-
        AGPL-3.0-or-later,
        Apache-2.0,
        BSD-2-Clause,
        BSD-3-Clause,
        CC0-1.0,
        GPL-2.0,
        GPL-2.0-only,
        GPL-2.0-or-later,
        GPL-3.0,
        GPL-3.0-only,
        GPL-3.0-or-later,
        ISC,
        LGPL-2.1,
        LGPL-2.1-only,
        LGPL-2.1-or-later,
        LGPL-3.0,
        LGPL-3.0-only,
        LGPL-3.0-or-later,
        MIT,
        MPL-2.0,
        Python-2.0,
        Unlicense
      comment_summary_in_pr: on-failure
