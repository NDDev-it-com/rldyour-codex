name: dependency-review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: dependency-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    name: Dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Review dependencies
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          allow-licenses: >-
            AGPL-3.0,
            AGPL-3.0-only,
            AGPL-3.0-or-later,
            Apache-2.0,
            BSD-2-Clause,
            BSD-3-Clause,
            CC0-1.0,
            GPL-2.0,
            GPL-2.0-only,
            GPL-2.0-or-later,
            GPL-3.0,
            GPL-3.0-only,
            GPL-3.0-or-later,
            ISC,
            LGPL-2.1,
            LGPL-2.1-only,
            LGPL-2.1-or-later,
            LGPL-3.0,
            LGPL-3.0-only,
            LGPL-3.0-or-later,
            MIT,
            MPL-2.0,
            Python-2.0,
            Unlicense
          comment-summary-in-pr: on-failure
