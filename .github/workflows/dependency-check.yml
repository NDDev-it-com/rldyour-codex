name: dependency-check

on:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dependency-check-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mcp-runtime-pins:
    name: MCP runtime pin freshness
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up validation runtime
        uses: ./.github/actions/setup-codex-runtime
        with:
          install-codex: "false"
          install-dart: "false"

      - name: Check pinned MCP runtime versions
        run: |
          python3 scripts/check_mcp_runtime_versions.py --fail-on-outdated --json > dependency-check.json

      - name: Write dependency summary
        if: always()
        run: |
          {
            echo "## MCP runtime pin freshness"
            echo ""
            if [ -f dependency-check.json ]; then
              echo '```json'
              cat dependency-check.json
              echo '```'
            else
              echo "dependency-check.json was not created"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload dependency report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dependency-check
          path: dependency-check.json
          retention-days: 14
