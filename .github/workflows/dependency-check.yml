name: dependency-check

on:
  schedule:
    - cron: "30 5 * * *"
  push:
    branches: [main]
    paths:
      - "config/mcp-runtime-versions.env"
      - "plugins/rldyour-mcps/.mcp.json"
      - "scripts/check_mcp_runtime_versions.py"
      - ".github/workflows/dependency-check.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dependency-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mcp-runtime-pins:
    name: MCP runtime pin freshness (scheduled)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up validation runtime
        uses: ./.github/actions/setup-codex-runtime
        with:
          install-codex: "false"
          install-dart: "false"

      - name: Check pinned MCP runtime versions
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/check_mcp_runtime_versions.py --fail-on-outdated --json > dependency-check.json

      - name: Write dependency summary
        if: always()
        run: |
          {
            echo "## MCP runtime pin freshness"
            echo ""
            if [ -f dependency-check.json ]; then
              echo '```json'
              cat dependency-check.json
              echo '```'
            else
              echo "dependency-check.json was not created"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload dependency report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dependency-check
          path: dependency-check.json
          retention-days: 14
