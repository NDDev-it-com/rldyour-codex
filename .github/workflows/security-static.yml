name: security-static

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-static-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  static-security:
    name: No-paid static security
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up validation runtime
        uses: ./.github/actions/setup-codex-runtime
        with:
          install-codex: "false"
          install-dart: "false"

      - name: Install actionlint
        shell: bash
        run: |
          set -euo pipefail
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.22
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Validate GitHub Action SHA pins
        run: python3 scripts/validate_action_pins.py

      - name: actionlint
        run: actionlint

      - name: Text security scan
        run: python3 scripts/scan_text_security.py

      - name: ShellCheck
        run: shellcheck plugins/rldyour-serena-mcp/hooks/*.sh plugins/rldyour-serena-mcp/scripts/*.sh plugins/rldyour-flow/hooks/*.sh plugins/rldyour-flow/scripts/*.sh plugins/rldyour-lsps/scripts/*.sh scripts/*.sh

      - name: Pyright
        run: |
          # shellcheck source=config/mcp-runtime-versions.env
          . config/mcp-runtime-versions.env
          PYRIGHT_PYTHON_FORCE_VERSION=latest \
            uv run --with "pyright==1.1.409" --with "mcp==${MCP_PYTHON_SDK_VERSION}" --with pyyaml python -m pyright --project pyrightconfig.json
