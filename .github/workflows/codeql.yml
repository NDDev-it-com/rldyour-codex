name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 4 * * 0"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    strategy:
      fail-fast: false
      matrix:
        language: [python, actions]
    uses: NDDev-it-com/nddev-ci-workflows/.github/workflows/public-codeql.yml@86f3e6d70a632561527379e5f962f57de81eb751 # 0.2.4
    with:
      languages: '["${{ matrix.language }}"]'
