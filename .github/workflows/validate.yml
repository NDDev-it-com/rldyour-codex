name: validate

on:
  push:
    branches:
      - main
      - fullrepo
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "37 3 * * 1"

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  marketplace:
    name: Marketplace and system smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    env:
      CODEX_HOME: /tmp/rldyour-codex-home
      RLDYOUR_MCP_CAPABILITY_LIST_ONLY: "1"
      RLDYOUR_MCP_CAPABILITY_ALLOW_MISSING_ENV: "1"
      RLDYOUR_SKIP_LSP_HEALTH: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1.7.2

      - name: Install system packages
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y jq ripgrep shellcheck
          elif [ "$RUNNER_OS" = "macOS" ]; then
            command -v jq >/dev/null 2>&1 || brew install jq
            command -v rg >/dev/null 2>&1 || brew install ripgrep
            command -v shellcheck >/dev/null 2>&1 || brew install shellcheck
          else
            echo "Unsupported runner OS: $RUNNER_OS" >&2
            exit 1
          fi

      - name: Install pinned Codex CLI
        run: |
          # shellcheck source=config/mcp-runtime-versions.env
          . config/mcp-runtime-versions.env
          npm install -g "@openai/codex@${CODEX_CLI_VERSION}"
          codex --version

      - name: Install rldyour Codex into temporary CODEX_HOME
        run: |
          scripts/install_system_codex.sh --dry-run --codex-home "$CODEX_HOME"
          scripts/install_system_codex.sh --apply --codex-home "$CODEX_HOME"

      - name: Validate marketplace
        run: scripts/validate_marketplace.sh

      - name: Doctor temporary system Codex
        run: scripts/doctor_system_codex.sh --codex-home "$CODEX_HOME"

      - name: Clean bootstrap smoke
        run: scripts/smoke_clean_bootstrap.sh

      - name: Write validation summary
        if: success()
        run: |
          {
            echo "## rldyour Codex validation"
            echo "- OS: ${RUNNER_OS}"
            echo "- Ref: ${GITHUB_REF}"
            echo "- SHA: ${GITHUB_SHA}"
            echo "- Checks: marketplace validation, doctor, clean bootstrap, fullrepo sync smoke"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Collect diagnostics
        if: failure()
        run: scripts/collect_diagnostics.sh --output diagnostics/ci

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: diagnostics-${{ matrix.os }}
          path: diagnostics/ci

  dependency-pins:
    name: MCP runtime pin freshness
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"

      - name: Check pinned MCP runtime versions
        run: python3 scripts/check_mcp_runtime_versions.py --fail-on-outdated --json > dependency-check.json

      - name: Write dependency summary
        if: always()
        run: |
          {
            echo "## MCP runtime pin freshness"
            echo ""
            if [ -f dependency-check.json ]; then
              echo '```json'
              cat dependency-check.json
              echo '```'
            else
              echo "dependency-check.json was not created"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload dependency report
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: dependency-check
          path: dependency-check.json

  mcp-safe-calls:
    name: MCP safe call smoke (ubuntu)
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CODEX_HOME: /tmp/rldyour-codex-home
      RLDYOUR_MCP_CAPABILITY_ALLOW_MISSING_ENV: "1"
      RLDYOUR_SKIP_LSP_HEALTH: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1.7.2

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y jq ripgrep shellcheck

      - name: Install pinned Codex CLI
        run: |
          # shellcheck source=config/mcp-runtime-versions.env
          . config/mcp-runtime-versions.env
          npm install -g "@openai/codex@${CODEX_CLI_VERSION}"
          codex --version

      - name: Install rldyour Codex into temporary CODEX_HOME
        run: scripts/install_system_codex.sh --apply --codex-home "$CODEX_HOME"

      - name: Probe deterministic MCP tool calls
        run: |
          scripts/smoke_mcp_capabilities.sh \
            --codex-home "$CODEX_HOME" \
            --allow-missing-env \
            --skip-server figma
