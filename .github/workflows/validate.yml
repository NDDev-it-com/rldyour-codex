name: validate

on:
  workflow_dispatch:
    inputs:
      scope:
        description: Validation scope to run.
        required: true
        default: fast
        type: choice
        options:
          - fast
          - runtime
          - release
          - mcp
          - full
      include_macos:
        description: Also run the selected validation scope on macOS. macOS is intentionally opt-in for cost control.
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}-${{ inputs.scope }}-${{ inputs.include_macos }}
  cancel-in-progress: true

jobs:
  fast-ubuntu:
    name: Fast validation (ubuntu)
    if: inputs.scope == 'fast' || inputs.scope == 'runtime' || inputs.scope == 'release' || inputs.scope == 'full'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up validation runtime
        uses: ./.github/actions/setup-codex-runtime
        with:
          install-codex: "false"
          install-dart: "false"

      - name: Bootstrap fullrepo agent context
        run: scripts/sync_fullrepo_branch.sh --bootstrap-init

      - name: Run fast validation
        shell: bash
        run: |
          set -euo pipefail
          scripts/validate_fast.sh 2>pytest.stderr.log
          python3 scripts/classify_ci_noise.py --strict pytest.stderr.log

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fast-validation-ubuntu
          path: |
            pytest.xml
            coverage.xml
            pytest.stderr.log
          retention-days: 14

  fast-macos:
    name: Fast validation (macos)
    if: inputs.include_macos && (inputs.scope == 'fast' || inputs.scope == 'runtime' || inputs.scope == 'release' || inputs.scope == 'full')
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up validation runtime
        uses: ./.github/actions/setup-codex-runtime
        with:
          install-codex: "false"
          install-dart: "false"

      - name: Bootstrap fullrepo agent context
        run: scripts/sync_fullrepo_branch.sh --bootstrap-init

      - name: Run fast validation
        shell: bash
        run: |
          set -euo pipefail
          scripts/validate_fast.sh 2>pytest.stderr.log
          python3 scripts/classify_ci_noise.py --strict pytest.stderr.log

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fast-validation-macos
          path: |
            pytest.xml
            coverage.xml
            pytest.stderr.log
          retention-days: 14

  runtime-ubuntu:
    name: Runtime smoke (ubuntu)
    if: inputs.scope == 'runtime' || inputs.scope == 'full'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      CODEX_HOME: /tmp/rldyour-codex-home
      RLDYOUR_MCP_CAPABILITY_LIST_ONLY: "1"
      RLDYOUR_MCP_CAPABILITY_ALLOW_MISSING_ENV: "1"
      RLDYOUR_SKIP_LSP_HEALTH: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up validation runtime
        uses: ./.github/actions/setup-codex-runtime

      - name: Run runtime validation
        run: scripts/validate_runtime.sh --codex-home "$CODEX_HOME" --strict-runtime

      - name: Write validation summary
        if: success()
        run: |
          {
            echo "## rldyour Codex validation"
            echo "- OS: ${RUNNER_OS}"
            echo "- Ref: ${GITHUB_REF}"
            echo "- SHA: ${GITHUB_SHA}"
            echo "- Checks: installer, quick strict doctor, hook smoke, fullrepo sync smoke"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Collect diagnostics
        if: failure()
        run: scripts/collect_diagnostics.sh --output diagnostics/ci

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: diagnostics-ubuntu
          path: diagnostics/ci
          retention-days: 14

  runtime-macos:
    name: Runtime smoke (macos)
    if: inputs.include_macos && (inputs.scope == 'runtime' || inputs.scope == 'full')
    runs-on: macos-latest
    timeout-minutes: 35
    env:
      CODEX_HOME: /tmp/rldyour-codex-home
      RLDYOUR_MCP_CAPABILITY_LIST_ONLY: "1"
      RLDYOUR_MCP_CAPABILITY_ALLOW_MISSING_ENV: "1"
      RLDYOUR_SKIP_LSP_HEALTH: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up validation runtime
        uses: ./.github/actions/setup-codex-runtime

      - name: Run runtime validation
        run: scripts/validate_runtime.sh --codex-home "$CODEX_HOME" --strict-runtime

      - name: Write validation summary
        if: success()
        run: |
          {
            echo "## rldyour Codex validation"
            echo "- OS: ${RUNNER_OS}"
            echo "- Ref: ${GITHUB_REF}"
            echo "- SHA: ${GITHUB_SHA}"
            echo "- Checks: installer, quick strict doctor, hook smoke, fullrepo sync smoke"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Collect diagnostics
        if: failure()
        run: scripts/collect_diagnostics.sh --output diagnostics/ci

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: diagnostics-macos
          path: diagnostics/ci
          retention-days: 14

  release:
    name: Release dry-run
    if: inputs.scope == 'release' || inputs.scope == 'full'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up validation runtime
        uses: ./.github/actions/setup-codex-runtime
        with:
          install-codex: "false"
          install-dart: "false"

      - name: Run release validation
        run: scripts/validate_release.sh

      - name: Upload release dry-run evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-dry-run
          path: dist/validation
          retention-days: 7

  dependency-pins:
    name: MCP runtime pin freshness
    if: inputs.scope == 'mcp' || inputs.scope == 'full'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up validation runtime
        uses: ./.github/actions/setup-codex-runtime
        with:
          install-codex: "false"
          install-dart: "false"

      - name: Check pinned MCP runtime versions
        run: python3 scripts/check_mcp_runtime_versions.py --fail-on-outdated --json > dependency-check.json

      - name: Write dependency summary
        if: always()
        run: |
          {
            echo "## MCP runtime pin freshness"
            echo ""
            if [ -f dependency-check.json ]; then
              echo '```json'
              cat dependency-check.json
              echo '```'
            else
              echo "dependency-check.json was not created"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload dependency report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dependency-check
          path: dependency-check.json
          retention-days: 14

  mcp-safe-calls:
    name: MCP safe call smoke (ubuntu)
    if: inputs.scope == 'mcp' || inputs.scope == 'full'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CODEX_HOME: /tmp/rldyour-codex-home
      RLDYOUR_MCP_CAPABILITY_ALLOW_MISSING_ENV: "1"
      RLDYOUR_SKIP_LSP_HEALTH: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up validation runtime
        uses: ./.github/actions/setup-codex-runtime

      - name: Bootstrap fullrepo agent context
        run: scripts/sync_fullrepo_branch.sh --bootstrap-init

      - name: Install rldyour Codex into temporary CODEX_HOME
        run: scripts/install_system_codex.sh --apply --codex-home "$CODEX_HOME"

      - name: Probe deterministic MCP tool calls
        run: |
          set -euo pipefail
          scripts/smoke_mcp_capabilities.sh \
            --codex-home "$CODEX_HOME" \
            --allow-missing-env \
            --skip-server figma \
            2>mcp-safe-calls.stderr.log
          python3 scripts/classify_ci_noise.py --strict mcp-safe-calls.stderr.log

      - name: Upload MCP safe-call stderr
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mcp-safe-calls-stderr
          path: mcp-safe-calls.stderr.log
          retention-days: 14
