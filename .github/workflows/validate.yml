name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      scope:
        description: Validation scope to run.
        required: true
        default: full
        type: choice
        options:
          - fast
          - runtime
          - release
          - mcp
          - full

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  fast-ubuntu:
    name: Fast validation (ubuntu)
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.scope == 'fast' || inputs.scope == 'runtime' || inputs.scope == 'release' || inputs.scope == 'mcp' || inputs.scope == 'full'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up validation runtime
        uses: ./.github/actions/setup-codex-runtime
        with:
          install-codex: "false"
          install-dart: "false"

      - name: Bootstrap fullrepo agent context
        shell: bash
        run: |
          set -o pipefail
          mkdir -p dist/gates
          scripts/sync_fullrepo_branch.sh --bootstrap-ci 2>&1 | tee dist/gates/fullrepo-bootstrap.log

      - name: Run fast validation
        shell: bash
        run: |
          set -euo pipefail
          scripts/validate_fast.sh 2>pytest.stderr.log
          python3 scripts/classify_ci_noise.py --strict pytest.stderr.log

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fast-validation-ubuntu
          path: |
            pytest.xml
            coverage.xml
            pytest.stderr.log
            dist/gates/fullrepo-bootstrap.log
            dist/gates/fullrepo-bootstrap-ci.json
          retention-days: 14

  runtime-ubuntu:
    name: Runtime smoke (ubuntu)
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.scope == 'runtime' || inputs.scope == 'full'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      CODEX_HOME: /tmp/rldyour-codex-home
      RLDYOUR_MCP_CAPABILITY_LIST_ONLY: "1"
      RLDYOUR_MCP_CAPABILITY_ALLOW_MISSING_ENV: "1"
      RLDYOUR_SKIP_LSP_HEALTH: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up validation runtime
        uses: ./.github/actions/setup-codex-runtime

      - name: Run runtime validation
        run: scripts/validate_runtime.sh --codex-home "$CODEX_HOME" --strict-runtime

      - name: Write validation summary
        if: success()
        run: |
          {
            echo "## rldyour Codex validation"
            echo "- OS: ${RUNNER_OS}"
            echo "- Ref: ${GITHUB_REF}"
            echo "- SHA: ${GITHUB_SHA}"
            echo "- Checks: installer, quick strict doctor, Codex hooks/list trust smoke, hook smoke, fullrepo sync smoke"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Collect diagnostics
        if: failure()
        run: scripts/collect_diagnostics.sh --output diagnostics/ci

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: diagnostics-ubuntu
          path: diagnostics/ci
          retention-days: 14

  release:
    name: Release dry-run
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.scope == 'release' || inputs.scope == 'full'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up validation runtime
        uses: ./.github/actions/setup-codex-runtime
        with:
          install-codex: "false"
          install-dart: "false"

      - name: Run release validation
        run: scripts/validate_release.sh

      - name: Upload release dry-run evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-dry-run
          path: dist/validation
          retention-days: 7

  dependency-pins:
    name: MCP runtime pin freshness
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.scope == 'mcp' || inputs.scope == 'full'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up validation runtime
        uses: ./.github/actions/setup-codex-runtime
        with:
          install-codex: "false"
          install-dart: "false"

      - name: Check pinned MCP runtime versions (advisory)
        run: |
          python3 scripts/check_mcp_runtime_versions.py --json > dependency-check.json || true

      - name: Write dependency summary
        if: always()
        run: |
          {
            echo "## MCP runtime pin freshness (advisory on pull requests)"
            echo ""
            echo "This job runs without --fail-on-outdated so a stale pin does not"
            echo "block pull request merges. The dependency-check.yml workflow on a"
            echo "daily schedule runs with --fail-on-outdated and surfaces stale"
            echo "pins as a separate signal for the maintainer to act on."
            echo ""
            if [ -f dependency-check.json ]; then
              echo '```json'
              cat dependency-check.json
              echo '```'
            else
              echo "dependency-check.json was not created"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload dependency report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dependency-check
          path: dependency-check.json
          retention-days: 14

  mcp-safe-calls:
    name: MCP safe call smoke (ubuntu)
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && (inputs.scope == 'mcp' || inputs.scope == 'full'))
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CODEX_HOME: /tmp/rldyour-codex-home
      RLDYOUR_MCP_CAPABILITY_ALLOW_MISSING_ENV: "1"
      RLDYOUR_SKIP_LSP_HEALTH: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up validation runtime
        uses: ./.github/actions/setup-codex-runtime

      - name: Bootstrap fullrepo agent context
        shell: bash
        run: |
          set -o pipefail
          mkdir -p dist/gates
          scripts/sync_fullrepo_branch.sh --bootstrap-ci 2>&1 | tee dist/gates/fullrepo-bootstrap.log

      - name: Install rldyour Codex into temporary CODEX_HOME
        run: scripts/install_system_codex.sh --apply --codex-home "$CODEX_HOME"

      - name: Probe deterministic MCP tool calls
        run: |
          set -euo pipefail
          # figma is a localhost MCP and grep.app is an external hosted MCP; both are
          # unreachable/unreliable on GitHub-hosted runners, so their live safe-call probe
          # is skipped in CI. Both stay config-validated (static) and function in real use.
          scripts/smoke_mcp_capabilities.sh \
            --codex-home "$CODEX_HOME" \
            --allow-missing-env \
            --skip-server figma \
            --skip-server grep \
            2>mcp-safe-calls.stderr.log
          python3 scripts/classify_ci_noise.py --strict mcp-safe-calls.stderr.log

      - name: Upload MCP safe-call stderr
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mcp-safe-calls-stderr
          path: |
            mcp-safe-calls.stderr.log
            dist/gates/fullrepo-bootstrap.log
            dist/gates/fullrepo-bootstrap-ci.json
          retention-days: 14
