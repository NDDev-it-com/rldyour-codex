name: setup-codex-runtime
description: Install the rldyour Codex validation runtime.

inputs:
  install-codex:
    description: Install pinned @openai/codex globally.
    required: false
    default: "true"
  install-dart:
    description: Install Dart SDK for dart-flutter MCP checks.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Load runtime pins
      shell: bash
      run: |
        set -euo pipefail
        # shellcheck source=config/mcp-runtime-versions.env
        . config/mcp-runtime-versions.env
        echo "RLDYOUR_BUN_VERSION=${BUN_VERSION}" >> "$GITHUB_ENV"
        echo "RLDYOUR_DART_SDK_VERSION=${DART_SDK_VERSION}" >> "$GITHUB_ENV"

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.13"

    - name: Set up uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        enable-cache: true

    - name: Set up Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version: ${{ env.RLDYOUR_BUN_VERSION }}

    - name: Set up Dart
      if: inputs.install-dart == 'true'
      uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.6
      with:
        sdk: ${{ env.RLDYOUR_DART_SDK_VERSION }}

    - name: Install system packages
      shell: bash
      run: |
        set -euo pipefail
        if [ "$RUNNER_OS" = "Linux" ]; then
          sudo apt-get update
          sudo apt-get install -y jq ripgrep shellcheck
        elif [ "$RUNNER_OS" = "macOS" ]; then
          command -v jq >/dev/null 2>&1 || brew install jq
          command -v rg >/dev/null 2>&1 || brew install ripgrep
          command -v shellcheck >/dev/null 2>&1 || brew install shellcheck
        else
          echo "Unsupported runner OS: $RUNNER_OS" >&2
          exit 1
        fi

    - name: Install pinned GitHub MCP server
      if: inputs.install-codex == 'true'
      shell: bash
      run: |
        set -euo pipefail
        # shellcheck source=config/mcp-runtime-versions.env
        . config/mcp-runtime-versions.env
        : "${GITHUB_MCP_SERVER_VERSION:?GITHUB_MCP_SERVER_VERSION is required}"
        case "$RUNNER_OS" in
          Linux) os_name="Linux" ;;
          macOS) os_name="Darwin" ;;
          *)
            echo "Unsupported runner OS for github-mcp-server: $RUNNER_OS" >&2
            exit 1
            ;;
        esac
        case "$(uname -m)" in
          x86_64|amd64) arch_name="x86_64" ;;
          arm64|aarch64) arch_name="arm64" ;;
          i386|i686) arch_name="i386" ;;
          *)
            echo "Unsupported runner architecture for github-mcp-server: $(uname -m)" >&2
            exit 1
            ;;
        esac
        archive="github-mcp-server_${os_name}_${arch_name}.tar.gz"
        base_url="https://github.com/github/github-mcp-server/releases/download/v${GITHUB_MCP_SERVER_VERSION}"
        tmp_dir="$(mktemp -d)"
        install_dir="${RUNNER_TEMP:-$tmp_dir}/rldyour-bin"
        mkdir -p "$install_dir"
        curl -fsSL "${base_url}/${archive}" -o "${tmp_dir}/${archive}"
        curl -fsSL "${base_url}/github-mcp-server_${GITHUB_MCP_SERVER_VERSION}_checksums.txt" -o "${tmp_dir}/checksums.txt"
        grep "  ${archive}$" "${tmp_dir}/checksums.txt" > "${tmp_dir}/checksums.selected"
        if [ "$RUNNER_OS" = "Linux" ]; then
          (cd "$tmp_dir" && sha256sum -c checksums.selected)
        else
          expected_sha="$(awk '{print $1}' "${tmp_dir}/checksums.selected")"
          actual_sha="$(shasum -a 256 "${tmp_dir}/${archive}" | awk '{print $1}')"
          if [ "$expected_sha" != "$actual_sha" ]; then
            echo "github-mcp-server checksum mismatch" >&2
            exit 1
          fi
        fi
        tar -xzf "${tmp_dir}/${archive}" -C "$tmp_dir"
        install -m 0755 "${tmp_dir}/github-mcp-server" "${install_dir}/github-mcp-server"
        echo "$install_dir" >> "$GITHUB_PATH"
        "${install_dir}/github-mcp-server" --version || "${install_dir}/github-mcp-server" --help >/dev/null

    - name: Install pinned Codex CLI
      if: inputs.install-codex == 'true'
      shell: bash
      run: |
        set -euo pipefail
        # shellcheck source=config/mcp-runtime-versions.env
        . config/mcp-runtime-versions.env
        npm install -g "@openai/codex@${CODEX_CLI_VERSION}"
        codex --version
